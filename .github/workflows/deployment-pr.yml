name: Resource Deployment PR

on: 
 pull_request:
   types: [opened, synchronize, reopened, edited]
   paths:
    - ".github/workflows/deployment-pr.yml"
    - "Deployment/**"

permissions:
  id-token: write
  contents: read

jobs:
 Deployment:
  runs-on: ubuntu-latest
  defaults:
   run:
    working-directory: ./Deployment
  steps:
   - name: Checkout Code
     uses: actions/checkout@v6